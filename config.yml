# ── 核心相关 ──────────────────────────────────────────────
binary_name: alist
binary_rename: ""          # 留空则不重命名
binary_version: ""         # 留空则随机生成
binary_ipk_name: ""        # 留空则用 binary_name

# ── LuCI 相关 ─────────────────────────────────────────────
service_name: alist
luci_version: ""           # 留空则随机生成
luci_ipk_name: ""          # 留空则用 luci-app-{service_name}
description: "A file list program"
log_path: /var/log/alist.log

# ── 字段配置 ──────────────────────────────────────────────
# 规则：
#   start_cmd 只有 fixed，没有 enabled（必须项）
#   其余字段：enabled=0 不显示；enabled=1 fixed=1 不显示输入框值写死；enabled=1 fixed=0 显示输入框
#   web_port.enabled=0 时不显示"打开Web界面"按钮
#   web_port.enabled=1 fixed=1 时 value 必填
#   其余 enabled=1 fixed=1 时 value 必填

start_cmd:
  fixed: 1
  value: "/usr/bin/alist server --data /etc/alist"

web_port:
  enabled: 1
  fixed: 1
  value: "5244"

working_dir:
  enabled: 0
  fixed: 0
  value: ""

environment:
  enabled: 0
  fixed: 0
  value: ""              # 多个环境变量用空格隔开，如：KEY1=val1 KEY2=val2

exec_pre:
  enabled: 0
  fixed: 0
  value: ""

exec_post:
  enabled: 0
  fixed: 0
  value: ""
