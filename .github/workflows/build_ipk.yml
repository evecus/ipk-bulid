name: Build IPK

on:
  workflow_dispatch:
    inputs:
      package_type:
        description: '打包类型'
        required: true
        type: choice
        options:
          - '仅打包可执行文件'
          - '打包可执行文件 + LuCI 界面'
      file_url:
        description: '文件下载链接（支持 .tar.gz / .gz / .zip / 直链 ELF）'
        required: true
        type: string
      file_rename:
        description: '[仅打包] 可执行文件重命名（留空则不修改）'
        required: false
        type: string
      binary_version:
        description: '[仅打包] IPK 版本号（留空则随机生成）'
        required: false
        type: string
      binary_ipk_name:
        description: '[仅打包] IPK 名称（留空则使用文件名）'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # ── 读取 config.yml（LuCI 模式）────────────────────────
      - name: Read config.yml
        if: inputs.package_type == '打包可执行文件 + LuCI 界面'
        id: cfg
        run: |
          python3 - << 'PYEOF'
          import yaml, os, sys

          with open('config.yml', 'r') as f:
              c = yaml.safe_load(f)

          gho = open(os.environ['GITHUB_OUTPUT'], 'a')

          def out(k, v):
              v = str(v) if v is not None else ''
              v = v.replace('%', '%25').replace('\n', '%0A').replace('\r', '%0D')
              gho.write(f"{k}={v}\n")

          def require(val, label):
              if not val or not str(val).strip():
                  print(f"::error::{label} 为必填项，请在 config.yml 中填写", file=sys.stderr)
                  sys.exit(1)

          out('binary_name',    c.get('binary_name', ''))
          out('binary_rename',  c.get('binary_rename') or c.get('binary_name', ''))
          out('binary_version', c.get('binary_version') or '')
          out('binary_ipk_name', c.get('binary_ipk_name') or c.get('binary_name', ''))
          out('service_name',   c.get('service_name', ''))
          out('luci_version',   c.get('luci_version') or '')
          out('luci_ipk_name',  c.get('luci_ipk_name') or f"luci-app-{c.get('service_name','')}")
          out('description',    c.get('description', ''))
          out('log_path',       c.get('log_path', '/var/log/service.log'))

          sc = c.get('start_cmd', {})
          out('sc_fixed', '1' if sc.get('fixed') else '0')
          if sc.get('fixed'):
              require(sc.get('value'), 'start_cmd.value (fixed=1)')
          out('sc_value', sc.get('value') or '')

          for field in ['web_port', 'working_dir', 'environment', 'exec_pre', 'exec_post']:
              fd = c.get(field, {})
              enabled = 1 if fd.get('enabled') else 0
              fixed   = 1 if fd.get('fixed')   else 0
              value   = fd.get('value') or ''
              out(f'{field}_enabled', enabled)
              out(f'{field}_fixed',   fixed)
              if enabled and fixed:
                  require(value, f'{field}.value (enabled=1 fixed=1)')
              out(f'{field}_value', value)

          gho.close()
          PYEOF

      # ── 下载并提取二进制 ────────────────────────────────────
      - name: Download and extract binary
        id: binary
        run: |
          curl -fsSL -o downloaded_file "${{ inputs.file_url }}"
          mkdir -p extracted

          MAGIC=$(xxd -p -l 6 downloaded_file)
          if echo "$MAGIC" | grep -q '^504b0304'; then
            unzip -o downloaded_file -d extracted/
          elif echo "$MAGIC" | grep -q '^1f8b'; then
            if tar -tzf downloaded_file >/dev/null 2>&1; then
              tar -xzf downloaded_file -C extracted/
            else
              gunzip -c downloaded_file > extracted/binary_file
            fi
          elif echo "$MAGIC" | grep -q '^fd377a585a00'; then
            tar -xJf downloaded_file -C extracted/ 2>/dev/null \
              || xz -d -c downloaded_file > extracted/binary_file
          elif echo "$MAGIC" | grep -q '^7f454c46'; then
            cp downloaded_file extracted/binary_file
          else
            tar -xf downloaded_file -C extracted/ 2>/dev/null \
              || cp downloaded_file extracted/binary_file
          fi

          BINARY=$(find extracted/ -type f | while read f; do
            file "$f" | grep -qiE 'executable|elf' && echo "$f" && break
          done)
          [ -z "$BINARY" ] && \
            BINARY=$(find extracted/ -type f \
              ! -name "*.txt" ! -name "*.md" ! -name "*.json" \
              | xargs ls -S 2>/dev/null | head -1)

          if [ "${{ inputs.package_type }}" = "打包可执行文件 + LuCI 界面" ]; then
            RENAME="${{ steps.cfg.outputs.binary_rename }}"
          else
            RENAME="${{ inputs.file_rename }}"
          fi
          FINAL_NAME="${RENAME:-$(basename "$BINARY")}"
          cp "$BINARY" "$FINAL_NAME"
          chmod 755 "$FINAL_NAME"

          echo "binary_path=$FINAL_NAME" >> $GITHUB_OUTPUT
          echo "binary_name=$FINAL_NAME" >> $GITHUB_OUTPUT

      # ── 解析版本和名称 ──────────────────────────────────────
      - name: Resolve versions and names
        id: meta
        run: |
          if [ "${{ inputs.package_type }}" = "打包可执行文件 + LuCI 界面" ]; then
            BIN_IPK_NAME="${{ steps.cfg.outputs.binary_ipk_name }}"
            BIN_VERSION="${{ steps.cfg.outputs.binary_version }}"
            LUCI_PKG="${{ steps.cfg.outputs.luci_ipk_name }}"
            LUCI_VERSION="${{ steps.cfg.outputs.luci_version }}"
          else
            BIN_IPK_NAME="${{ inputs.binary_ipk_name }}"
            [ -z "$BIN_IPK_NAME" ] && BIN_IPK_NAME="${{ steps.binary.outputs.binary_name }}"
            BIN_VERSION="${{ inputs.binary_version }}"
            LUCI_PKG=""
            LUCI_VERSION=""
          fi

          rand_ver() { echo "$(shuf -i 1-9 -n1).$(shuf -i 0-9 -n1).$(shuf -i 0-99 -n1)"; }
          [ -z "$BIN_VERSION" ]  && BIN_VERSION=$(rand_ver)
          [ -z "$LUCI_VERSION" ] && LUCI_VERSION="$(rand_ver)-r1"

          echo "bin_ipk_name=$BIN_IPK_NAME" >> $GITHUB_OUTPUT
          echo "bin_version=$BIN_VERSION"   >> $GITHUB_OUTPUT
          echo "luci_pkg=$LUCI_PKG"         >> $GITHUB_OUTPUT
          echo "luci_version=$LUCI_VERSION" >> $GITHUB_OUTPUT

      # ── 打包二进制 IPK ──────────────────────────────────────
      - name: Build binary IPK
        id: build_bin
        run: |
          BIN_NAME="${{ steps.binary.outputs.binary_name }}"
          BIN_IPK_NAME="${{ steps.meta.outputs.bin_ipk_name }}"
          BIN_VERSION="${{ steps.meta.outputs.bin_version }}"
          IPK_FILE="${BIN_IPK_NAME}_${BIN_VERSION}_all.ipk"

          mkdir -p ipk_bin/data/usr/bin ipk_bin/control
          cp "${{ steps.binary.outputs.binary_path }}" "ipk_bin/data/usr/bin/$BIN_NAME"
          chmod 755 "ipk_bin/data/usr/bin/$BIN_NAME"

          INSTALLED_SIZE=$(du -sk ipk_bin/data | awk '{print $1}')
          cat > ipk_bin/control/control << EOF
          Package: $BIN_IPK_NAME
          Version: $BIN_VERSION
          Architecture: all
          Installed-Size: $INSTALLED_SIZE
          Section: utils
          Description: $BIN_IPK_NAME binary
          EOF

          echo "2.0" > debian-binary
          tar --numeric-owner --group=0 --owner=0 -czf control.tar.gz -C ipk_bin/control .
          tar --numeric-owner --group=0 --owner=0 -czf data.tar.gz    -C ipk_bin/data .
          tar --numeric-owner --group=0 --owner=0 -czf "$IPK_FILE" \
            debian-binary control.tar.gz data.tar.gz

          echo "ipk_file=$IPK_FILE" >> $GITHUB_OUTPUT

      # ── 生成 LuCI 文件 ──────────────────────────────────────
      - name: Build LuCI files
        if: inputs.package_type == '打包可执行文件 + LuCI 界面'
        env:
          SERVICE:      ${{ steps.cfg.outputs.service_name }}
          BINARY:       ${{ steps.binary.outputs.binary_name }}
          DESCRIPTION:  ${{ steps.cfg.outputs.description }}
          LOG_PATH:     ${{ steps.cfg.outputs.log_path }}
          SC_FIXED:     ${{ steps.cfg.outputs.sc_fixed }}
          SC_VALUE:     ${{ steps.cfg.outputs.sc_value }}
          WP_ENABLED:   ${{ steps.cfg.outputs.web_port_enabled }}
          WP_FIXED:     ${{ steps.cfg.outputs.web_port_fixed }}
          WP_VALUE:     ${{ steps.cfg.outputs.web_port_value }}
          WD_ENABLED:   ${{ steps.cfg.outputs.working_dir_enabled }}
          WD_FIXED:     ${{ steps.cfg.outputs.working_dir_fixed }}
          WD_VALUE:     ${{ steps.cfg.outputs.working_dir_value }}
          ENV_ENABLED:  ${{ steps.cfg.outputs.environment_enabled }}
          ENV_FIXED:    ${{ steps.cfg.outputs.environment_fixed }}
          ENV_VALUE:    ${{ steps.cfg.outputs.environment_value }}
          PRE_ENABLED:  ${{ steps.cfg.outputs.exec_pre_enabled }}
          PRE_FIXED:    ${{ steps.cfg.outputs.exec_pre_fixed }}
          PRE_VALUE:    ${{ steps.cfg.outputs.exec_pre_value }}
          POST_ENABLED: ${{ steps.cfg.outputs.exec_post_enabled }}
          POST_FIXED:   ${{ steps.cfg.outputs.exec_post_fixed }}
          POST_VALUE:   ${{ steps.cfg.outputs.exec_post_value }}
        run: |
          python3 - << 'PYEOF'
          import os

          def e(k): return os.environ.get(k, '')
          def b(k): return e(k) == '1'

          SERVICE      = e('SERVICE')
          BINARY       = e('BINARY')
          DESCRIPTION  = e('DESCRIPTION')
          LOG_PATH     = e('LOG_PATH')
          sc_fixed     = b('SC_FIXED');   sc_value    = e('SC_VALUE')
          wp_enabled   = b('WP_ENABLED'); wp_fixed    = b('WP_FIXED'); wp_value = e('WP_VALUE')
          wd_enabled   = b('WD_ENABLED'); wd_fixed    = b('WD_FIXED'); wd_value = e('WD_VALUE')
          env_enabled  = b('ENV_ENABLED');env_fixed   = b('ENV_FIXED');env_value= e('ENV_VALUE')
          pre_enabled  = b('PRE_ENABLED');pre_fixed   = b('PRE_FIXED');pre_value= e('PRE_VALUE')
          post_enabled = b('POST_ENABLED');post_fixed = b('POST_FIXED');post_value=e('POST_VALUE')

          os.makedirs('luci_build', exist_ok=True)

          # ── init.d ─────────────────────────────────────────
          with open('template/init.d.sh') as f: initd = f.read()

          # start_cmd（始终存在）
          if sc_fixed:
              cmd_line = f'procd_set_param command /bin/sh -c "{sc_value}"'
          else:
              cmd_line = f'procd_set_param command /bin/sh -c "$(uci -q get {SERVICE}.config.start_cmd)"'
          initd = initd.replace('    __START_CMD__', f'    {cmd_line}')

          # working_dir
          if wd_enabled:
              if wd_fixed:
                  wd = f'    cd "{wd_value}" 2>/dev/null || true\n    procd_set_param env HOME="{wd_value}"'
              else:
                  wd = ('    local _wd; config_get _wd config working_dir ""\n'
                        '    [ -n "$_wd" ] && cd "$_wd" 2>/dev/null\n'
                        '    [ -n "$_wd" ] && procd_set_param env HOME="$_wd"')
              initd = initd.replace('__WORKING_DIR__', wd)
          else:
              initd = initd.replace('\n__WORKING_DIR__', '')

          # environment
          if env_enabled:
              if env_fixed:
                  ev = '\n'.join(f'    procd_append_param env {x}' for x in env_value.split())
              else:
                  ev = ('    local _env; config_get _env config environment ""\n'
                        '    for _e in $_env; do procd_append_param env "$_e"; done')
              initd = initd.replace('__ENVIRONMENT__', ev)
          else:
              initd = initd.replace('\n__ENVIRONMENT__', '')

          # exec_pre
          if pre_enabled:
              if pre_fixed:
                  pr = f'\n    {pre_value}'
              else:
                  pr = '\n    local _pre; config_get _pre config exec_pre ""\n    [ -n "$_pre" ] && eval "$_pre"'
              initd = initd.replace('\n__EXEC_PRE__', pr)
          else:
              initd = initd.replace('\n__EXEC_PRE__', '')

          # exec_post
          if post_enabled:
              if post_fixed:
                  po = f'    {post_value}'
              else:
                  po = '    local _post; config_get _post config exec_post ""\n    [ -n "$_post" ] && eval "$_post"'
              initd = initd.replace('__EXEC_POST__', po)
          else:
              initd = initd.replace('__EXEC_POST__', '    :')

          initd = initd.replace('__SERVICE__', SERVICE)
          open('luci_build/init.d', 'w').write(initd)

          # ── uci config ─────────────────────────────────────
          with open('template/uci_config') as f: uci = f.read()
          fields = []
          if not sc_fixed:  fields.append(f"\toption start_cmd '/usr/bin/{BINARY}'")
          if wp_enabled and not wp_fixed: fields.append(f"\toption web_port '{wp_value}'")
          if wd_enabled and not wd_fixed: fields.append("\toption working_dir ''")
          if env_enabled and not env_fixed: fields.append("\toption environment ''")
          if pre_enabled and not pre_fixed: fields.append("\toption exec_pre ''")
          if post_enabled and not post_fixed: fields.append("\toption exec_post ''")
          uci = uci.replace('__SERVICE__', SERVICE).replace('__UCI_FIELDS__', '\n'.join(fields))
          open('luci_build/uci_config', 'w').write(uci)

          # ── menu.json ──────────────────────────────────────
          with open('template/menu.json') as f: menu = f.read()
          open('luci_build/menu.json', 'w').write(menu.replace('__SERVICE__', SERVICE))

          # ── acl.json ───────────────────────────────────────
          with open('template/acl.json') as f: acl = f.read()
          acl = acl.replace('__SERVICE__', SERVICE).replace('__BINARY__', BINARY).replace('__LOG_PATH__', LOG_PATH)
          open('luci_build/acl.json', 'w').write(acl)

          # ── log.js ─────────────────────────────────────────
          with open('template/log.js') as f: log_js = f.read()
          open('luci_build/log.js', 'w').write(log_js.replace('__LOG_PATH__', LOG_PATH))

          # ── main.js ────────────────────────────────────────
          with open('template/main.js') as f: main_js = f.read()
          main_js = main_js.replace('__SERVICE__', SERVICE).replace('__DESCRIPTION__', DESCRIPTION)

          # 打开 Web 界面按钮（端口写在 renderStatus 函数体内）
          if wp_enabled:
              port_expr = f"'{wp_value}'" if wp_fixed else f"(uci.get('{SERVICE}', 'config', 'web_port') || '')"
              open_btn = (
                  f"var webPort = {port_expr};\n"
                  "        var btnUrl = 'http://' + window.location.hostname + ':' + webPort + '/';\n"
                  "        var button = '<input class=\"cbi-button-reload\" type=\"button\" "
                  "style=\"margin-left:50px\" value=\"' + _('打开 Web 界面') + '\" "
                  "onclick=\"window.open(\\'' + btnUrl + '\\')\">\';"
              )
              main_js = main_js.replace('        __OPEN_BTN__', '        ' + open_btn)
              main_js = main_js.replace('__OPEN_BTN_APPEND__', ' + button')
          else:
              main_js = main_js.replace('\n        __OPEN_BTN__', '')
              main_js = main_js.replace('__OPEN_BTN_APPEND__', '')

          # 表单字段
          ff = []
          if not sc_fixed:
              ff.append(f"o = s.option(form.Value, 'start_cmd', '启动命令');\n        o.rmempty = false;\n        o.placeholder = '/usr/bin/{BINARY}';")
          if wp_enabled and not wp_fixed:
              ff.append("o = s.option(form.Value, 'web_port', '网页端口');\n        o.datatype = 'port';\n        o.rmempty = false;")
          if wd_enabled and not wd_fixed:
              ff.append("o = s.option(form.Value, 'working_dir', '工作目录');\n        o.rmempty = true;")
          if env_enabled and not env_fixed:
              ff.append("o = s.option(form.Value, 'environment', '环境变量');\n        o.placeholder = 'KEY1=val1 KEY2=val2';\n        o.rmempty = true;")
          if pre_enabled and not pre_fixed:
              ff.append("o = s.option(form.Value, 'exec_pre', '启动前执行');\n        o.rmempty = true;")
          if post_enabled and not post_fixed:
              ff.append("o = s.option(form.Value, 'exec_post', '停止后执行');\n        o.rmempty = true;")

          main_js = main_js.replace('        __FORM_FIELDS__', ('\n\n        ').join(ff) if ff else '')
          open('luci_build/main.js', 'w').write(main_js)
          print("LuCI files generated OK")
          PYEOF

      # ── 打包 LuCI IPK ───────────────────────────────────────
      - name: Build LuCI IPK
        if: inputs.package_type == '打包可执行文件 + LuCI 界面'
        id: build_luci
        run: |
          SERVICE="${{ steps.cfg.outputs.service_name }}"
          LUCI_PKG="${{ steps.meta.outputs.luci_pkg }}"
          LUCI_VERSION="${{ steps.meta.outputs.luci_version }}"
          BIN_IPK_NAME="${{ steps.meta.outputs.bin_ipk_name }}"
          LUCI_IPK="${LUCI_PKG}_${LUCI_VERSION}_all.ipk"

          mkdir -p luci_ipk/data/etc/{init.d,config,uci-defaults}
          mkdir -p luci_ipk/data/usr/share/{luci/menu.d,rpcd/acl.d}
          mkdir -p luci_ipk/data/www/luci-static/resources/view/${SERVICE}
          mkdir -p luci_ipk/control

          cp luci_build/init.d     luci_ipk/data/etc/init.d/${SERVICE}
          chmod +x luci_ipk/data/etc/init.d/${SERVICE}
          cp luci_build/uci_config luci_ipk/data/etc/config/${SERVICE}

          cat > luci_ipk/data/etc/uci-defaults/${LUCI_PKG} << EOF
          #!/bin/sh
          /etc/init.d/${SERVICE} enable
          /etc/init.d/rpcd restart
          exit 0
          EOF
          chmod +x luci_ipk/data/etc/uci-defaults/${LUCI_PKG}

          cp luci_build/menu.json luci_ipk/data/usr/share/luci/menu.d/${LUCI_PKG}.json
          cp luci_build/acl.json  luci_ipk/data/usr/share/rpcd/acl.d/${LUCI_PKG}.json
          cp luci_build/main.js   luci_ipk/data/www/luci-static/resources/view/${SERVICE}/main.js
          cp luci_build/log.js    luci_ipk/data/www/luci-static/resources/view/${SERVICE}/log.js

          INSTALLED_SIZE=$(du -sk luci_ipk/data | awk '{print $1}')
          cat > luci_ipk/control/control << EOF
          Package: $LUCI_PKG
          Version: $LUCI_VERSION
          Depends: libc, $BIN_IPK_NAME, luci-base, rpcd
          Architecture: all
          Installed-Size: $INSTALLED_SIZE
          Section: luci
          Description: LuCI interface for $SERVICE
          EOF

          echo "2.0" > luci_deb
          tar --numeric-owner --group=0 --owner=0 -czf luci_ctrl.tar.gz -C luci_ipk/control .
          tar --numeric-owner --group=0 --owner=0 -czf luci_data.tar.gz -C luci_ipk/data .
          tar --numeric-owner --group=0 --owner=0 -czf "$LUCI_IPK" \
            --transform 's|luci_deb|debian-binary|' \
            --transform 's|luci_ctrl\.tar\.gz|control.tar.gz|' \
            --transform 's|luci_data\.tar\.gz|data.tar.gz|' \
            luci_deb luci_ctrl.tar.gz luci_data.tar.gz

          echo "luci_ipk_file=$LUCI_IPK" >> $GITHUB_OUTPUT

      # ── 发布 Release ────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          generate_release_notes: false
          files: |
            ${{ steps.build_bin.outputs.ipk_file }}
            ${{ steps.build_luci.outputs.luci_ipk_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
