name: Build IPK Package

on:
  workflow_dispatch:
    inputs:
      package_type:
        description: '打包类型'
        required: true
        type: choice
        options:
          - '仅打包可执行文件'
          - '打包可执行文件 + LuCI 界面'

      file_url:
        description: '文件下载链接（支持 .tar.gz / .gz / .zip / 直链）'
        required: true
        type: string

      file_rename:
        description: '可执行文件重命名（留空则不修改）'
        required: false
        type: string

      binary_version:
        description: '核心 IPK 版本号（留空则随机生成，例如：1.0.0）'
        required: false
        type: string

      binary_ipk_name:
        description: '核心 IPK 名称（留空则使用可执行文件名）'
        required: false
        type: string

      service_name:
        description: '服务名称，仅打包 LuCI 时需要（例如：alist）'
        required: false
        type: string

      luci_version:
        description: 'LuCI IPK 版本号（留空则随机生成，例如：1.0-1）'
        required: false
        type: string

      luci_ipk_name:
        description: 'LuCI IPK 名称（留空则使用 luci-app-{服务名}）'
        required: false
        type: string

      release_notes:
        description: 'Release 说明（留空则自动生成）'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        run: |
          if [ "${{ inputs.package_type }}" = "打包可执行文件 + LuCI 界面" ]; then
            if [ -z "${{ inputs.service_name }}" ]; then
              echo "::error::打包 LuCI 时必须填写服务名称"
              exit 1
            fi
          fi

      - name: Download and extract binary
        id: binary
        run: |
          URL="${{ inputs.file_url }}"
          echo "Downloading: $URL"
          curl -fsSL -o downloaded_file "$URL"
          mkdir -p extracted
          MAGIC=$(xxd -p -l 6 downloaded_file)
          echo "Magic bytes: $MAGIC"
          if echo "$MAGIC" | grep -q '^504b0304'; then
            unzip -o downloaded_file -d extracted/
          elif echo "$MAGIC" | grep -q '^1f8b'; then
            if tar -tzf downloaded_file >/dev/null 2>&1; then
              tar -xzf downloaded_file -C extracted/
            else
              gunzip -c downloaded_file > extracted/binary_file
            fi
          elif echo "$MAGIC" | grep -q '^fd377a585a00'; then
            if tar -xJf downloaded_file -C extracted/ 2>/dev/null; then
              echo "Extracted as tar.xz"
            else
              xz -d -c downloaded_file > extracted/binary_file
            fi
          elif echo "$MAGIC" | grep -q '^7f454c46'; then
            cp downloaded_file extracted/binary_file
          else
            tar -xf downloaded_file -C extracted/ 2>/dev/null || \
              cp downloaded_file extracted/binary_file
          fi
          BINARY=$(find extracted/ -type f | while read f; do
            ft=$(file "$f" | tr '[:upper:]' '[:lower:]')
            if echo "$ft" | grep -qE 'executable|elf|script'; then
              echo "$f"; break
            fi
          done)
          if [ -z "$BINARY" ]; then
            BINARY=$(find extracted/ -type f ! -name "*.txt" ! -name "*.md" ! -name "*.json" \
              | xargs ls -S 2>/dev/null | head -1)
          fi
          RENAME="${{ inputs.file_rename }}"
          if [ -n "$RENAME" ]; then
            FINAL_NAME="$RENAME"
          else
            FINAL_NAME=$(basename "$BINARY")
          fi
          cp "$BINARY" "$FINAL_NAME"
          chmod 755 "$FINAL_NAME"
          echo "binary_path=$FINAL_NAME" >> $GITHUB_OUTPUT
          echo "binary_name=$FINAL_NAME" >> $GITHUB_OUTPUT
